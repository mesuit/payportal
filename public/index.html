<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makamesco Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans text-white">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-blue-400">Secure Checkout</h2>
            <p class="text-slate-400 text-sm mt-2">Makamesco Digital Solutions</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Amount (KES)</label>
                <input id="amount" type="number" placeholder="e.g. 500" 
                    class="w-full bg-slate-700 border border-slate-600 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition text-white">
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Phone Number</label>
                <input id="phone" type="text" placeholder="07... or 254..." 
                    class="w-full bg-slate-700 border border-slate-600 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition text-white">
            </div>
            
            <div class="pt-4">
                <button onclick="payMpesa()" id="mpesaBtn" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-mobile-screen-button"></i>
                    <span>Pay via M-PESA STK</span>
                </button>
            </div>

            <div class="relative flex items-center py-4">
                <div class="flex-grow border-t border-slate-700"></div>
                <span class="flex-shrink mx-4 text-slate-500 text-xs font-bold uppercase">Or pay with card</span>
                <div class="flex-grow border-t border-slate-700"></div>
            </div>

            <button onclick="alert('Card/PayPal integration coming soon!')" 
                class="w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2">
                <i class="fa-brands fa-paypal text-blue-700"></i>
                <i class="fa-solid fa-credit-card text-slate-700"></i>
                <span>PayPal / Credit Card</span>
            </button>
        </div>

        <p class="text-center text-[10px] text-slate-500 mt-8 uppercase tracking-widest">
            <i class="fa-solid fa-lock text-green-500"></i> 256-bit SSL Encrypted
        </p>
    </div>

    <script>
        async function payMpesa() {
            const amount = document.getElementById('amount').value;
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('mpesaBtn');

            if (!amount || !phone) {
                return alert("⚠️ Please provide both amount and phone number.");
            }

            // UI Loading State
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>Processing...</span>`;
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/stk-push', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount, phone })
                });

                const data = await response.json();

                if (response.ok && data.status === "Success") {
                    alert("✅ STK Push Sent! Enter your M-Pesa PIN on your phone to complete.");
                } else {
                    alert("❌ Error: " + (data.message || "Something went wrong with Payhero."));
                }
            } catch (err) {
                console.error("Client Error:", err);
                alert("🚨 Network Error: Could not connect to the server.");
            } finally {
                // Restore Button State
                btn.innerHTML = originalContent;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
